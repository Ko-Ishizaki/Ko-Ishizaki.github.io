<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>web_viewer</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    header {
      display: flex;
      gap: 8px;
      padding: 10px;
      background: #222;
      color: white;
    }

    input {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 4px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #4caf50;
      color: white;
    }

    button:hover {
      background: #43a047;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 52px);
      border: none;
      background: white;
    }

    .hint {
      font-size: 12px;
      opacity: 0.7;
      margin-left: 10px;
      align-self: center;
    }
  </style>
</head>

<body>

  <header>
    <input id="urlInput" placeholder="https://example.com を入力" />
    <button onclick="loadPage()">表示</button>
    <span class="hint">※iframe制限で表示できないサイトもあります</span>
  </header>

  <iframe id="viewer"></iframe>

  <script>
    function normalizeUrl(url) {
      if (!url) return "";
      if (!url.startsWith("http://") && !url.startsWith("https://")) {
        return "https://" + url;
      }
      return url;
    }

    function loadPage() {
      const input = document.getElementById("urlInput").value;
      const url = normalizeUrl(input);
      document.getElementById("viewer").src = url;
    }

    // Enterキー対応
    document.getElementById("urlInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        loadPage();
      }
    });
  </script>

</body>
</html>
